<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自我介紹</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0f0c29;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 45%, #24243e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* 背景光暈裝飾 */
    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      pointer-events: none;
    }
    body::before {
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, #7c3aed, transparent 70%);
      top: -120px;
      left: -120px;
      animation: drift 12s ease-in-out infinite alternate;
    }
    body::after {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #ec4899, transparent 70%);
      bottom: -100px;
      right: -80px;
      animation: drift 16s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.12); }
    }

    /* 卡片 */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 28px;
      padding: 60px 72px;
      max-width: 560px;
      width: 92%;
      text-align: center;
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.4),
        0 32px 80px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* 卡片頂部光邊 */
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 28px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.03) 60%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(36px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* 頭像 */
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f6d365 0%, #fda085 60%, #f093fb 100%);
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      box-shadow:
        0 0 0 4px rgba(255, 255, 255, 0.1),
        0 12px 32px rgba(253, 160, 133, 0.35);
      transition: transform 0.3s ease;
    }
    .avatar:hover { transform: scale(1.06) rotate(4deg); }

    h1 {
      font-size: 2.1rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    }

    .subtitle {
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 30px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .divider {
      width: 56px;
      height: 3px;
      background: linear-gradient(to right, #f6d365, #fda085, #f093fb);
      border-radius: 99px;
      margin: 0 auto 36px;
      box-shadow: 0 0 12px rgba(246, 211, 101, 0.4);
    }

    .section-title {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.38);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      margin-bottom: 14px;
      font-weight: 500;
    }

    .interests {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 36px;
    }

    .tag {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      padding: 7px 22px;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: background 0.25s, border-color 0.25s, transform 0.2s;
      cursor: default;
    }
    .tag:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.4);
      transform: translateY(-2px);
    }

    blockquote {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-left: 3px solid rgba(246, 211, 101, 0.7);
      border-radius: 0 14px 14px 0;
      padding: 18px 22px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 1.0rem;
      font-style: italic;
      line-height: 1.8;
      letter-spacing: 0.03em;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <h1>西打</h1>
    <p class="subtitle">About Me</p>
    <div class="divider"></div>

    <p class="section-title">興趣 · Interests</p>
    <div class="interests">
      <span class="tag">寫作</span>
    </div>

    <p class="section-title">座右銘 · Motto</p>
    <blockquote>
      「不要相信你的每個念頭。」
    </blockquote>
  </div>
</body>
</html>
